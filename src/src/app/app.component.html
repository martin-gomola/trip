<app-loader [message]="loadingMessage()" />
<router-outlet></router-outlet>
<p-toast [preventOpenDuplicates]="true" class="z-9999"
    [breakpoints]="{ '920px': { width: '95%', left: '0', right: '0', margin: '0 auto' } }" />
<p-toast key="app-update" position="bottom-center" class="z-9999"
    [breakpoints]="{ '920px': { width: 'calc(100vw - 2rem)', left: '50%', right: 'auto', bottom: 'max(1rem, env(safe-area-inset-bottom))', transform: 'translateX(-50%)', margin: '0' } }">
    <ng-template let-message pTemplate="message">
        <div class="flex flex-col gap-2 w-full cursor-pointer" role="button" tabindex="0"
            (click)="reloadForUpdate()" (keydown.enter)="reloadForUpdate()" (keydown.space)="reloadForUpdate()">
            <div class="font-semibold">{{ message.summary }}</div>
            <div class="text-sm">{{ message.detail }}</div>
            <button type="button"
                class="self-start mt-1 px-3 py-1.5 rounded-md bg-primary text-primary-contrast text-sm font-medium hover:opacity-90"
                (click)="reloadForUpdate(); $event.stopPropagation()">
                Reload
            </button>
        </div>
    </ng-template>
</p-toast>
