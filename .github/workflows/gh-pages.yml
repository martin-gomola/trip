name: Build and Deploy docs to gh-pages

on:
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - ".github/workflows/gh-pages.yml"
  workflow_dispatch:

concurrency:
  group: gh-pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Build and publish Docusaurus
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git init "$GITHUB_WORKSPACE"
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git -c http.extraheader="AUTHORIZATION: bearer ${GITHUB_TOKEN}" fetch --depth=1 origin "${GITHUB_SHA}"
          git checkout --force FETCH_HEAD

      - name: Show tool versions
        run: |
          node --version
          npm --version

      - name: Install dependencies
        working-directory: ./docs
        run: npm ci

      - name: Build website
        working-directory: ./docs
        run: npm run build

      - name: Publish to gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          rm -rf "$RUNNER_TEMP/trip-pages"
          mkdir -p "$RUNNER_TEMP/trip-pages"
          cp -R docs/build/. "$RUNNER_TEMP/trip-pages/"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git -c http.extraheader="AUTHORIZATION: bearer ${GITHUB_TOKEN}" fetch origin gh-pages || true
          if git show-ref --verify --quiet refs/remotes/origin/gh-pages; then
            git checkout --force -B gh-pages origin/gh-pages
          else
            git checkout --orphan gh-pages
          fi

          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -R "$RUNNER_TEMP/trip-pages/." .
          touch .nojekyll

          git add -A
          if git diff --cached --quiet; then
            echo "No documentation changes to publish."
            exit 0
          fi

          git commit -m "Deploy docs to GitHub Pages"
          git -c http.extraheader="AUTHORIZATION: bearer ${GITHUB_TOKEN}" push origin gh-pages
